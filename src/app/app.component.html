<div class="layout">
  <aside class="sidebar">
    <header class="brand">
      <h1>🍺 Daddy's Beer</h1>
      <p>Where should daddy get his beer with his friends?</p>
    </header>

    <section class="panel">
      <h2>Friends</h2>
      <ul class="friends">
        <li *ngFor="let f of friendsService.friends(); trackBy: trackById" class="friend">
          <div class="friend-row">
            <input
              class="name"
              [value]="f.name"
              (change)="onName(f, $any($event.target).value)"
              placeholder="Name"
            />
            <button class="remove" (click)="friendsService.removeFriend(f.id)" title="Remove">
              ✕
            </button>
          </div>
          <input
            class="address"
            [value]="f.address"
            (change)="onAddress(f, $any($event.target).value)"
            placeholder="Address"
          />
          <div class="friend-meta">
            <span *ngIf="f.geocodeFailed" class="warn">⚠ address not found</span>
            <label *ngIf="friendsService.cheatMode()" class="weight">
              weight
              <input
                type="number"
                min="0"
                step="1"
                [value]="f.weight"
                (change)="onWeight(f, $any($event.target).value)"
              />
            </label>
          </div>
        </li>
      </ul>

      <div class="add-friend">
        <input [(ngModel)]="newName" placeholder="Name" (keyup.enter)="addFriend()" />
        <input [(ngModel)]="newAddress" placeholder="Address" (keyup.enter)="addFriend()" />
        <button (click)="addFriend()">Add friend</button>
      </div>
    </section>

    <section class="panel">
      <h2>Meeting point</h2>

      <label class="control">
        <span>Radius: <b>{{ (friendsService.radiusMeters() / 1000).toFixed(1) }} km</b></span>
        <input
          type="range"
          min="200"
          max="15000"
          step="100"
          [value]="friendsService.radiusMeters()"
          (input)="onRadius($any($event.target).value)"
        />
      </label>

      <label class="control toggle">
        <input
          type="checkbox"
          [checked]="friendsService.cheatMode()"
          (change)="friendsService.setCheatMode($any($event.target).checked)"
        />
        <span>
          Cheat mode
          <small>weights override locations (e.g. Ricsi = 100)</small>
        </span>
      </label>

      <button class="reset" (click)="friendsService.resetToDefaults()">
        Reset to default friends
      </button>
    </section>

    <footer class="hint">
      Geocoding by OpenStreetMap · data saved in your browser
    </footer>
  </aside>

  <main class="map-area">
    <app-map></app-map>
  </main>
</div>
